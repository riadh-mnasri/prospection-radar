spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  quartz:
    job-store-type: memory

server:
  port: ${PORT:8080}

logging:
  level:
    com.radar: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
