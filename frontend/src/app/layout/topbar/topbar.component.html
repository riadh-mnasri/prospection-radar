<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <a routerLink="/dashboard" class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="url(#g1)" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" fill="url(#g1)"/>
            <line x1="12" y1="2" x2="12" y2="6" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="20.5" y1="6.5" x2="17.6" y2="8.1" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="20.5" y1="17.5" x2="17.6" y2="15.9" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="g1" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7c3aed"/>
                <stop offset="1" stop-color="#10b981"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Prospection <span class="logo-accent">Radar</span></span>
      </a>

      <nav class="nav">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
          </svg>
          Dashboard
        </a>
        <a routerLink="/missions" routerLinkActive="active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          Missions
        </a>
        <a routerLink="/signals" routerLinkActive="active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Signaux
        </a>
        <a routerLink="/favorites" routerLinkActive="active" class="nav-link nav-fav">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Favoris
        </a>
      </nav>
    </div>

    <div class="topbar-right">
      @if (lastUpdate()) {
        <span class="last-update">Mis à jour {{ lastUpdate() }}</span>
      }
      <button class="btn btn-ghost btn-icon" (click)="refresh()" title="Actualiser">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="btn btn-primary btn-scan" [disabled]="scanning()" (click)="scan()">
        @if (scanning()) {
          <span class="spinner"></span>
          <span>Scan…</span>
        } @else {
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          <span>Scanner</span>
        }
      </button>
    </div>
  </div>

  @if (scanning()) {
    <div class="scan-progress">
      <div class="scan-bar-fill"></div>
      <span class="scan-label">{{ scanStep() }}</span>
    </div>
  }
</header>
